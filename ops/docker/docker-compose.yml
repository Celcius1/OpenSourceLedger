services:
  # 1. THE VAULT (PostgreSQL Database)
  osl-vault:
    image: postgres:15-alpine
    container_name: osl-vault
    restart: always
    environment:
      POSTGRES_USER: osl_admin
      POSTGRES_PASSWORD: Pr@toss2026!
      POSTGRES_DB: osl_main
    volumes:
      - osl_ledger_data:/var/lib/postgresql/data
      - ../sql/init_schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - osl_internal_net

  # 2. THE AUTHENTICATOR (Authelia)
  osl-auth:
    image: authelia/authelia
    container_name: osl-auth
    volumes:
      - ./auth/config:/config
    networks:
      - osl_internal_net
    ports:
      - "127.0.0.1:9094:9091"
    restart: unless-stopped
    environment:
      - TZ=Australia/Adelaide

  # 2a. THE IDENTIFIER (LLDAP)
  osl-identity:
    image: lldap/lldap:latest
    container_name: osl-identity
    restart: always
    environment:
      - LLDAP_LDAP_BASE_DN=dc=osl,dc=net,dc=au
      - LLDAP_LDAP_USER_PASS=Pr@toss2026!
      - LLDAP_DATABASE_URL=postgres://osl_admin:Pr@toss2026!@osl-vault:5432/osl_identity
      - LLDAP_JWT_SECRET=y#FUp2e*Wcnp%O=anYB_+FL{{u):4PeN
      - LLDAP_KEY_SEED=osl_sovereign_identity_seed_2026
    networks:
      - osl_internal_net
    ports:
      - "17180:17170"
    volumes:
      - ./auth/lldap:/data

  # 3. THE BRAIN (C++ Core Engine)
  osl-core:
    build:
      context: ../../
      dockerfile: ops/docker/Dockerfile.core
    container_name: osl-core
    restart: always
    volumes:
      - /opt/docker/OSL/core/templates:/app/core/templates:ro
      - /opt/docker/OSL/core/config:/app/core/config:rw
      - /opt/docker/OSL/src/web:/app/www:ro
      # Standardised plugin mount point
      - osl_plugin_binaries:/plugins:ro
    environment:
      - OSL_PORT=8080
      - OSL_BASE_DOMAIN=osl.net.au
      - OSL_DB_CONN=host=osl-vault user=osl_admin password=Pr@toss2026! dbname=osl_main
      - OSL_LDAP_URI=ldap://osl-identity:3890
      - LLDAP_GRAPHQL_URL=http://osl-identity:17170/query
      - LLDAP_ADMIN_USER=admin
      - LLDAP_ADMIN_PASS=Pr@toss2026!
    networks:
      - osl_internal_net
      - default
    depends_on:
      - osl-vault
      - osl-tax-plugin
      - osl-landlord-plugin # Race condition fix

  # 4. THE GATEWAY (Nginx)
  osl-proxy:
    image: nginx:alpine
    container_name: osl-proxy
    restart: always
    volumes:
      - ./:/etc/nginx/conf.d/:ro
    networks:
      - osl_internal_net
    ports:
      - "127.0.0.1:9000:80"
    depends_on:
      - osl-core
      - osl-auth

  # 5. THE PLUGINS (Developed by Cel-Tech-Serv Pty Ltd)
  osl-tax-plugin:
    build:
      context: ../../
      dockerfile: src/plugins/official/osl-plugin-tax-au/Dockerfile
    container_name: osl-tax-plugin
    restart: always
    volumes:
      - osl_plugin_binaries:/app/dist:rw
    networks:
      - osl_internal_net

  osl-landlord-plugin:
    build:
      context: ../../
      dockerfile: src/plugins/official/osl-plugin-landlord/Dockerfile
    container_name: osl-landlord-plugin
    restart: always
    volumes:
      - osl_plugin_binaries:/app/dist:rw
    networks:
      - osl_internal_net

networks:
  osl_internal_net:
    name: osl_internal_net
    driver: bridge
    ipam:
      config:
        - subnet: 10.5.0.0/24
          gateway: 10.5.0.1

volumes:
  osl_ledger_data:
  osl_plugin_binaries: